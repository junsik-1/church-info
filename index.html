<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報</title>
<style>
body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
 background:linear-gradient(135deg,#4f8cff,#7fd6ff);
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
}
.card{
 width:90%;
 max-width:380px;
 background:#fff;
 border-radius:20px;
 padding:36px 24px;
 text-align:center;
 box-shadow:0 12px 30px rgba(0,0,0,.15);
}
h1{margin:0 0 10px;font-size:32px;}
p{color:#666;margin-bottom:28px;}
.btn{
 display:block;
 text-decoration:none;
 color:#fff;
 font-size:20px;
 font-weight:700;
 padding:18px;
 border-radius:14px;
 margin:16px 0;
 transition:.2s;
}
.map{background:#2e7d32;}
.video{background:#1976d2;}
.btn:active{transform:scale(.98);}
.footer{
 margin-top:24px;
 color:#999;
 font-size:13px;
}
</style>
</head>
<body>
<div class="card">
<h1>情報</h1>
<p>必要な項目を選択してください。</p>

<a class="btn map" href="https://maps.app.goo.gl/dZfPcAfhyWLZ2r6h7?g_st=ic">
📍 住所
</a>

<a class="btn video" href="https://youtu.be/jusIDvh3_T4?si=tZabvLXsiWsj0_Gw">
📖 四つの霊的法則
</a>

<div class="footer">Welcome</div>
</div>
</body>
</html>
